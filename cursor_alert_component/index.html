<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body, #chart-frame { width: 100%; height: 100%; margin: 0; border: 0; overflow: hidden; }
    body { background: transparent; }
    #chart-frame { display: block; }
  </style>
</head>
<body>
  <iframe id="chart-frame" title="Interactive stock chart" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  <script>
    const frame = document.getElementById("chart-frame");
    let lastHtml = null;

    function sendToStreamlit(type, payload) {
      window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, payload || {}), "*");
    }

    window.addEventListener("message", function(event) {
      const message = event.data || {};
      if (message.type === "streamlit:render") {
        const args = message.args || {};
        const height = Math.max(420, Number(args.height) || 760);
        if (args.chartHtml && args.chartHtml !== lastHtml) {
          lastHtml = args.chartHtml;
          frame.srcdoc = args.chartHtml;
        }
        sendToStreamlit("streamlit:setFrameHeight", { height: height });
        return;
      }

      if (event.source === frame.contentWindow && message.source === "nse-interactive-chart") {
        if (message.action === "create-price-alert") {
          sendToStreamlit("streamlit:setComponentValue", {
            value: message,
            dataType: "json"
          });
        }
        window.parent.postMessage(message, "*");
        // The Results table owns the chart overlay two levels above the
        // Streamlit chart page. Relay chart controls (close, previous, next,
        // and range changes) to that owner as well. The extra component frame
        // used for cursor alerts would otherwise swallow those actions.
        if (window.parent.parent && window.parent.parent !== window.parent) {
          window.parent.parent.postMessage(message, "*");
        }
      }
    });

    sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
    sendToStreamlit("streamlit:setFrameHeight", { height: 760 });
  </script>
</body>
</html>
