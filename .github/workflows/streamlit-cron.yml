name: Streamlit Cron

on:
  schedule:
    # Ping every 6 hours to reduce Streamlit hibernation risk
    - cron: "0 */6 * * *"

    # 5:00 AM IST = 11:30 PM UTC previous day
    - cron: "30 23 * * *"

    # 5:00 PM IST = 11:30 AM UTC
    - cron: "30 11 * * *"

  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        default: "ping"
        type: choice
        options:
          - ping
          - download

jobs:
  call-streamlit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Decide URL
        id: url
        run: |
          TASK="${{ github.event.inputs.task }}"

          if [ -z "$TASK" ]; then
            if [ "${{ github.event.schedule }}" = "0 */6 * * *" ]; then
              TASK="ping"
            else
              TASK="download"
            fi
          fi

          echo "Task: $TASK"

          if [ "$TASK" = "ping" ]; then
            echo "url=https://stockscreener09219.streamlit.app/?ping=1&token=${{ secrets.SCHEDULED_DOWNLOAD_TOKEN }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://stockscreener09219.streamlit.app/?scheduled_download=1&token=${{ secrets.SCHEDULED_DOWNLOAD_TOKEN }}&market=ALL&timeframe=DAY" >> "$GITHUB_OUTPUT"
          fi

      - name: Call Streamlit app with browser
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          node <<'NODE'
          const { chromium } = require('playwright');

          function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
          }

          (async () => {
            const url = "${{ steps.url.outputs.url }}";
            console.log("Opening:", url.replace(/token=[^&]+/, "token=***"));

            const browser = await chromium.launch();
            const page = await browser.newPage();

            const response = await page.goto(url, {
              waitUntil: "domcontentloaded",
              timeout: 300000
            });

            console.log("HTTP status:", response && response.status());

            let finalText = "";
            const deadline = Date.now() + 45 * 60 * 1000;

            while (Date.now() < deadline) {
              const texts = [];

              for (const frame of page.frames()) {
                try {
                  const bodyText = await frame.locator("body").innerText({ timeout: 3000 });
                  if (bodyText) texts.push(bodyText);
                } catch (e) {
                  // Frame not ready yet.
                }
              }

              finalText = texts.join("\n\n");

              if (
                finalText.includes("pong") ||
                finalText.includes("Scheduled download complete") ||
                finalText.includes("Unauthorized scheduled task request")
              ) {
                break;
              }

              await sleep(3000);
            }

            console.log("Page text preview:");
            console.log(finalText.slice(0, 3000));

            await browser.close();

            if (finalText.includes("Unauthorized scheduled task request")) {
              throw new Error("Streamlit token was rejected.");
            }

            if (!finalText.includes("pong") && !finalText.includes("Scheduled download complete")) {
              throw new Error("Expected ping/download response was not found.");
            }
          })();
          NODE