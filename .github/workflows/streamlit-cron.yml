name: Streamlit Cron

on:
  schedule:
    - cron: "0 */6 * * *"
    - cron: "30 23 * * *"
    - cron: "30 11 * * *"

  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        default: "ping"
        type: choice
        options:
          - ping
          - download

jobs:
  call-streamlit:
    runs-on: ubuntu-latest
    steps:
      - name: Decide URL
        id: url
        run: |
          TASK="${{ github.event.inputs.task }}"

          if [ -z "$TASK" ]; then
            if [ "${{ github.event.schedule }}" = "0 */6 * * *" ]; then
              TASK="ping"
            else
              TASK="download"
            fi
          fi

          echo "Task: $TASK"

          if [ "$TASK" = "ping" ]; then
            echo "url=https://stockscreener09219.streamlit.app/?ping=1&token=${{ secrets.SCHEDULED_DOWNLOAD_TOKEN }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://stockscreener09219.streamlit.app/?scheduled_download=1&token=${{ secrets.SCHEDULED_DOWNLOAD_TOKEN }}&market=ALL&timeframe=DAY" >> "$GITHUB_OUTPUT"
          fi

      - name: Call Streamlit app with browser
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          node <<'NODE'
          const { chromium } = require('playwright');

          (async () => {
            const url = "${{ steps.url.outputs.url }}";
            console.log("Opening:", url.replace(/token=[^&]+/, "token=***"));

            const browser = await chromium.launch();
            const page = await browser.newPage();

            const response = await page.goto(url, {
              waitUntil: "networkidle",
              timeout: 120000
            });

            console.log("HTTP status:", response && response.status());
            const text = await page.locator("body").innerText({ timeout: 30000 });
            console.log("Page text preview:");
            console.log(text.slice(0, 2000));

            await browser.close();

            if (!text.includes("pong") && !text.includes("Scheduled download complete")) {
              throw new Error("Expected ping/download response was not found.");
            }
          })();
          NODE