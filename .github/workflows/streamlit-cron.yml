name: Streamlit Cron

on:
  schedule:
    - cron: "0 */6 * * *"
    - cron: "30 23 * * *"
    - cron: "30 11 * * *"

  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        default: "ping"
        type: choice
        options:
          - ping
          - download

jobs:
  call-streamlit:
    runs-on: ubuntu-latest
    steps:
      - name: Decide URL
        id: url
        run: |
          TASK="${{ github.event.inputs.task }}"

          if [ -z "$TASK" ]; then
            if [ "${{ github.event.schedule }}" = "0 */6 * * *" ]; then
              TASK="ping"
            else
              TASK="download"
            fi
          fi

          echo "Task: $TASK"

          if [ "$TASK" = "ping" ]; then
            echo "url=https://stockscreener09219.streamlit.app/?ping=1&token=${{ secrets.SCHEDULED_DOWNLOAD_TOKEN }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://stockscreener09219.streamlit.app/?scheduled_download=1&token=${{ secrets.SCHEDULED_DOWNLOAD_TOKEN }}&market=ALL&timeframe=DAY" >> "$GITHUB_OUTPUT"
          fi

      - name: Call Streamlit app
        run: |
          echo "Calling Streamlit URL..."
          status=$(curl --silent --show-error \
            --user-agent "Mozilla/5.0" \
            --output response.html \
            --write-out "%{http_code}" \
            "${{ steps.url.outputs.url }}")

          echo "HTTP status: $status"
          echo "Response preview:"
          head -80 response.html

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Request failed"
            exit 1
          fi